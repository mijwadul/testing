version: "3.8"

services:
  # ─── Database ────────────────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kusuma_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kusuma_pass}
      POSTGRES_DB: ${POSTGRES_DB:-kusuma_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kusuma_user} -d ${POSTGRES_DB:-kusuma_erp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kusuma_user}:${POSTGRES_PASSWORD:-kusuma_pass}@db:5432/${POSTGRES_DB:-kusuma_erp}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
